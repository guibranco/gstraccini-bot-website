name: Codacy Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '39 8 * * 4'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    name: Codacy security scan (${{ matrix.tool }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        tool:
          # - bandit
          # - semgrep
          # - trivy
          - hadolint
          - eslint
          - stylelint

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run Codacy analysis
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08 # v4.4.7
        with:
          api-token: ${{ secrets.CODACY_API_TOKEN }}
          tool: ${{ matrix.tool }}
          format: sarif
          output: results-${{ matrix.tool }}.sarif
          gh-code-scanning-compat: true
          verbose: true
          max-allowed-issues: 2147483647

      - name: Upload SARIF results to GitHub
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: results-${{ matrix.tool }}.sarif
          category: codacy-${{ matrix.tool }}
